{% block content %}
{% load static %}
    <link rel="stylesheet" href="{% static 'css/login.css'%}">
   <title>Login</title>

    <div class="login-container">
        <h2>Login</h2>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <input type="submit" value="Login" class="login-btn">

            <a href="{% url 'register' %}" class="register-link">
                Don't have an account? Register
            </a>
        </form>

    </div>
{%endblock%}
